auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = "log-in.html";
  } else {

    const pendingOrder = JSON.parse(localStorage.getItem("pendingOrder"));

    if (pendingOrder) {
      // const ORDER_LIFECYCLE_SECONDS = 30;
      const ORDER_LIFECYCLE_SECONDS = 15;

      const orderData = {
        userId: user.uid,
        email: user.email || "",
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        status: { current: "paid" },
        lifecycle: { duration: ORDER_LIFECYCLE_SECONDS },
        delivery: pendingOrder.delivery,
        items: pendingOrder.items.map(i => ({
          name: i.name,
          qty: i.quantity,
          price: i.price
        })),
        pricing: pendingOrder.pricing
      };

      try {
        await db.collection("orders").add(orderData);
        localStorage.removeItem("pendingOrder");
      } catch (err) {
        console.error(err);
      }
    }

    loadOrders(user.uid);
  }
});


let ordersLoadedOnce = false;


/* ===============================
   LOAD ORDERS
================================ */

function loadOrders(uid) {
  const list = document.getElementById("ordersList");
  const empty = document.getElementById("emptyState");
  const loading = document.getElementById("loadingState");

  // show loading initially
  loading.style.display = "block";
  empty.style.display = "none";
  list.innerHTML = "";

  db.collection("orders")
    .where("userId", "==", uid)
    // .where("deleted", "!=", true)
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {

      // first real response from Firestore
      ordersLoadedOnce = true;

      loading.style.display = "none";
      list.innerHTML = "";

      Object.values(activeTimers).forEach(clearInterval);
      Object.keys(activeTimers).forEach(k => delete activeTimers[k]);

      if (snapshot.empty) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      snapshot.forEach(doc => {
        list.innerHTML += renderOrder(doc.id, doc.data());
      });

      // start countdowns AFTER DOM renders
      setTimeout(() => {
        snapshot.forEach(doc => {
          startOrderCountdown(doc.id, doc.data());
        });
      }, 0);
    });
}


/* ===============================
   RENDER ORDER
================================ */

function renderOrder(id, o) {
  const steps = ["Received","Paid","Processing","Out_for_delivery","Delivered"];
  const current = o.status?.current || "pending";

  const date = o.createdAt
    ? o.createdAt.toDate().toLocaleString()
    : "Just now";

  return `
  <div class="order-card" data-id="${id}" ondblclick="revealDelete(this, '${id}')">

    <div class="order-header">
      <span class="order-top">Order #${id.slice(0,4).toUpperCase()}</span>
      <span class="order-status ${current}">
        ${current === "delivered" ? "Settled" : current.replace("_"," ")}
      </span>
    </div>

      <div class="order-meta" data-address="${o.delivery?.address || 'your location'}">
      <p>Date: ${date}</p>
      <p>Amount: ₦${o.pricing?.total || "0"}</p>
    </div>

    <div class="countdown" id="timer-${id}" style="min-height:18px;"></div>

    <div class="status-bar">
      ${steps.map(s => `<span class="step">${s.split("_")[0]}</span>`).join("")}
    </div>

    <div class="order-actions">
      <button class="delete-btn" onclick="showDeleteModal('${id}')">Delete</button>
    </div>

    <button class="view-btn" onclick="viewOrder('${id}')">View details</button>
  </div>`;
}

/* ===============================
   COUNTDOWN LOGIC (FIXED)
================================ */

const activeTimers = {};

function startOrderCountdown(orderId, data) {
  const card = document.querySelector(`[data-id="${orderId}"]`);
  if (!card) return;

  // if (data.status?.current === "delivered") {
  //   settleOrder(card);
  //   return;
  // }

  // Another one
  if (data.status?.current === "delivered") {
  // Old order → just mark settled silently
  settleOrder(card, false);
  return;
}


  


  // const card = document.querySelector(`[data-id="${orderId}"]`);
  const timerEl = document.getElementById(`timer-${orderId}`);
  if (!card || !timerEl) return;

// 🔥 FIX: treat latest order as new even if lifecycle missing
if (!data.lifecycle) {
  // data.lifecycle = { duration: 40 };
  data.lifecycle = { duration: 15 };
}


  // const duration = data.lifecycle.duration * 1000;
  const duration = Math.min(data.lifecycle.duration, 15) * 1000;


const startTime = data.createdAt?.toDate().getTime();


  if (!startTime) return;

  const elapsed = Date.now() - startTime;

  // 📦 OLD ORDERS
  if (elapsed >= duration) {
    timerEl.textContent = "";
    settleOrder(card);
    return;
  }

  // 🆕 NEW ORDER — SHOW COUNTDOWN
  timerEl.style.display = "block";

  const steps = card.querySelectorAll(".step");
  steps[0]?.classList.add("active");
  steps[1]?.classList.add("active");

  if (activeTimers[orderId]) return;

  activeTimers[orderId] = setInterval(() => {
    const remaining = Math.max(0, duration - (Date.now() - startTime));
    const seconds = Math.ceil(remaining / 1000);

    console.log("COUNTDOWN:", seconds);
    timerEl.textContent = `${seconds}s`;

     // 🚨 FLASH RED WHEN 5 SECONDS LEFT
  if (remaining <= 5000) {           // 5000ms = 5s
    timerEl.classList.add("urgent");
  } else {
    timerEl.classList.remove("urgent");
  }

    updateSteps(card, 1 - remaining / duration);

    // if (remaining <= 0) {
    //   clearInterval(activeTimers[orderId]);
    //   delete activeTimers[orderId];
    //   timerEl.textContent = "";
    //   settleOrder(card);
    // }

    // Another one
    if (remaining <= 0) {
  clearInterval(activeTimers[orderId]);
  delete activeTimers[orderId];
  timerEl.textContent = "";

  // 🆕 Order JUST settled → show image
  settleOrder(card, true);
}

  }, 1000);
}

function vibrate(pattern) {
  if ("vibrate" in navigator) {
    navigator.vibrate(pattern);
  }
}


const shownToasts = {};

function showToastOnce(orderId, key, message, type) {
  const id = `${orderId}-${key}`;
  if (shownToasts[id]) return;

  shownToasts[id] = true;

  const toast = document.getElementById("toast");
  toast.className = `toast show ${type}`;
  toast.textContent = message;

  
  // 🔊 SOUND + 📳 VIBRATION
  if (type === "processing") {
    document.getElementById("sound-processing")?.play().catch(() => {});
    vibrate(150);
  }

  if (type === "out") {
    document.getElementById("sound-out")?.play().catch(() => {});
    vibrate([100, 50, 100]);
  }

  if (type === "delivered") {
    document.getElementById("sound-delivered")?.play().catch(() => {});
    vibrate([200, 100, 200]);
  }

  // setTimeout(() => {
  //   toast.className = "toast";
  // }, 5500);

  // Another one
    // ✅ RESET timer so all texts stay equal time
  clearTimeout(toast.hideTimer);
  toast.hideTimer = setTimeout(() => {
    toast.className = "toast";
  }, 3000);
}



function updateSteps(card, progress) {
  const steps = card.querySelectorAll(".step");
  const orderId = card.dataset.id;

  // Pull address safely from Firestore-rendered data
  const address =
    card.querySelector(".order-meta")?.dataset?.address ||
    "your location";

  steps[0]?.classList.add("active");
  steps[1]?.classList.add("active");

  if (progress >= 0.33) {
    steps[2]?.classList.add("active");
      setTimeout(() => {
    showToastOnce(
      orderId,
      "processing",
      "PROCESSING ORDER",
      "processing"
    );
      }, 600); // ⏳ 0.6s delay (adjust freely)
  }

  if (progress >= 0.66) {
    steps[3]?.classList.add("active");
          setTimeout(() => {

    showToastOnce(
      orderId,
      "out",
      "🚚 ORDER OUT FOR DELIVERY",
      "out"
    );
          }, 600); // ⏳ 0.6s delay (adjust freely)

  }

  if (progress >= 0.98) {
    steps[4]?.classList.add("active");
              setTimeout(() => {

    showToastOnce(
      orderId,
      "delivered",
      `ORDER DELIVERED TO YOUR LOCATION ➡️ ${address} `,
      "delivered"
    );
              }, 900); // ⏳ 0.6s delay (adjust freely)

  }
  
}

function showOrderSuccessOnce(orderId) {
  const key = `success-shown-${orderId}`;

  // 🚫 Already shown → do nothing
  if (sessionStorage.getItem(key)) return;

  // ✅ Mark as shown
  sessionStorage.setItem(key, "true");

  const overlay = document.getElementById("orderSuccessOverlay");
  overlay.style.display = "flex";

  setTimeout(() => {
    overlay.style.display = "none";
  }, 4000);
}
