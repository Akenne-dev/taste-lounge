<style>
    :root {
        --yellow: #FBC02D;
        --red: #C62828;

        --brown: #4E342E;
        --black: #1A1A1A;
        --white: #FFFFFF;
        --orange-glow: #FF7043;
        --red-glow: #E53935;
        --red: #C62828;
        --white: #fff;
        --black: #111;
        --bg: #f9f9f9;
    }

    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        overflow-x: hidden;
        background-color: var(--beige);
    }

    .wave {
        position: fixed;
        bottom: 0;
        left: 0;
        height: 100%;
        z-index: -1;
    }

    .container {
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-gap: 7rem;
        padding: 0 2rem;
    }

    .img {
        display: flex;
        justify-content: flex-end;
        align-items: center;
    }

    .login-content {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        text-align: center;
    }

    .img img {
        width: 600px;
    }

    form {
        width: 360px;
    }

    .login-content img {
        height: 150px;
    }

    .login-content h2 {
        margin: 15px 0;
        color: #333;
        text-transform: uppercase;
        font-size: 2.9rem;
    }

    .login-content .input-div {
        position: relative;
        display: grid;
        grid-template-columns: 7% 93%;
        margin: 25px 0;
        padding: 5px 0;
        border-bottom: 2px solid #d9d9d9;
    }

    .login-content .input-div.one {
        margin-top: 0;
    }

    .i {
        color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .i i {
        transition: .3s;
    }

    .input-div>div {
        position: relative;
        height: 45px;
    }

    .input-div>div>h5 {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: #000;
        font-size: 18px;
        transition: .3s;
    }

    .input-div:before,
    .input-div:after {
        content: '';
        position: absolute;
        bottom: -2px;
        width: 0%;
        height: 2px;
        background-color: #38d39f;
        transition: .4s;
    }

    .input-div:before {
        right: 50%;
    }

    .input-div:after {
        left: 50%;
    }

    .input-div.focus:before,
    .input-div.focus:after {
        width: 50%;
    }

    .input-div.focus>div>h5 {
        top: -5px;
        font-size: 15px;
    }

    .input-div.focus>.i>i {
        color: #38d39f;
    }

    .input-div>div>input {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        border: none;
        outline: none;
        background: none;
        padding: 0.5rem 0.7rem;
        font-size: 1.2rem;
        color: #555;
        font-family: 'poppins', sans-serif;
    }

    .input-div.pass {
        margin-bottom: 4px;
    }

    a {
        text-decoration: none;
        color: red;
        font-size: 0.9rem;
        transition: .3s;
    }

    a:hover {
        color: #38d39f;
    }

    .btn {
        display: block;
        width: 100%;
        height: 50px;
        border-radius: 25px;
        outline: none;
        border: none;
        background-image: linear-gradient(to right, #c30b0b, #ff0000, #c41010);
        background-size: 200%;
        font-size: 1.2rem;
        color: #fff;
        font-family: 'Poppins', sans-serif;
        text-transform: uppercase;
        margin: 1rem 0;
        cursor: pointer;
        transition: .5s;
    }

    .btn:hover {
        background-position: right;
    }
    .login-message {
        font-size: 24px;
        font-weight: 700;
        color: red;
        text-align: center;
        opacity: 0;
        transform: translateY(-10px);
        transition: all 0.5s ease;
        white-space: nowrap;
    }

    .login-message.active {
        opacity: 1;
        transform: translateY(0);
        animation: glowPulse 1.5s infinite alternate;
    }

    <img class="wave" src="golden-crispy-french-fries-basket_23-2151997993.jpg">

                 <p id="text" class="login-message"></p>
                <img src="taste-lounge-logo.png">
                <h2 class="title">Welcome</h2>
                <div class="input-div one">
                    <div class="i">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="div">
                        <h5>Username</h5>
                        <input type="text" class="input" id="namee">
                    </div>
                </div>
                <div class="input-div pass">
                    <div class="i">
                        <i class="fa-solid fa-envelope"></i>

                    </div>
                    <div class="div">
                        <h5>Email</h5>
                        <input type="email" class="input" id="email">
                    </div>
                </div>
                <div class="input-div pass">
                    <div class="i">
                        <i class="fas fa-eye" id="togglePassword" onclick="showPass()"></i>
                    </div>
                    <div class="div">
                        <h5>Password</h5>
                        <input type="password" class="input" id="password">
                    </div>
                </div>
                <div class="input-div pass">
                    <div class="i">
                        <i class="fas fa-eye" id="toggleConfirm" onclick="showConfirmPass()"></i>
                    </div>
                    <div class="div">
                        <h5>Confirm Password</h5>
                        <input type="password" class="input" id="confirmPass">
                    </div>
                </div>
                <p>Already have an account? <a href="log-in.html">Log In</a></p>
                <button onclick="signUp()" type="button" id="signUpBtn" class="btn" value="Sign Up">Sign Up</button>

            </form>
        </div>
    </div>

</html>
<script>

    const inputs = document.querySelectorAll(".input");
    function addcl() {
        let parent = this.parentNode.parentNode;
        parent.classList.add("focus");
    }

    function remcl() {
        let parent = this.parentNode.parentNode;
        if (this.value == "") {
            parent.classList.remove("focus");
        }
    }
    inputs.forEach(input => {
        input.addEventListener("focus", addcl);
        input.addEventListener("blur", remcl);
    });

    
    const firebaseConfig = {
        apiKey: "AIzaSyAW3atuDYr7OeuT2b-Tn_ooD93ZfPqMA4g",
        authDomain: "taste-lounge-3075.firebaseapp.com",
        projectId: "taste-lounge-3075",
        storageBucket: "taste-lounge-3075.firebasestorage.app",
        messagingSenderId: "923805907944",
        appId: "1:923805907944:web:8c054c78c5cbd75929c25d"
    };

    
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    


    
    function showPass() {
        let input = document.getElementById("password");
        let icon = document.getElementById("togglePassword");

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }

    
    function showConfirmPass() {
        let input = document.getElementById("confirmPass");
        let icon = document.getElementById("toggleConfirm");

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }

function signUp() {
  let load = document.getElementById('signUpBtn');
  load.textContent = 'Loading...';
  load.disabled = true;

  let username = document.getElementById('namee').value.trim();
  let email = document.getElementById('email').value.trim();
  let password = document.getElementById('password').value.trim();
  let confirmPass = document.getElementById('confirmPass').value.trim();

  if (!username || !email || !password || !confirmPass) {
    alert('All fields are mandatory');
    load.disabled = false;
    load.textContent = 'Sign Up';
    return;
  }

  if (password !== confirmPass) {
    alert('Password must match');
    load.disabled = false;
    load.textContent = 'Sign Up';
    return;
  }

  if (password.length < 8) {
    alert('Password must be at least 8 characters');
    load.disabled = false;
    load.textContent = 'Sign Up';
    return;
  }

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(async (userCredential) => {
      const user = userCredential.user;

      
      await user.updateProfile({
        displayName: username
      });

      
      await firebase.firestore()
        .collection("users")
        .doc(user.uid)
.set({
  username: username,
  email: email,
  createdAt: firebase.firestore.FieldValue.serverTimestamp()
});


      document.getElementById("text").textContent = "Sign-up successful...";
      document.getElementById("text").classList.add("active");

      setTimeout(() => {
        location.href = "log-in.html";
      }, 2000);
    })
    .catch((error) => {
      alert(error.message);
      load.disabled = false;
      load.textContent = 'Sign Up';
    });
}


</script>
