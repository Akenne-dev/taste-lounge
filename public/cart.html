 /* ==============================

============================== */

    /* ==============================
   MOBILE SLIDE MENU
============================== */
    .mobile-menu {

      top: 0;
      left: -100%;
      width: 260px;
      height: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);

    .mobile-menu .close-btn {

      color: var(--black);
    }
        body.dark .mobile-menu a  {

    }

    .mobile-menu a:hover {

    }

    /* ==============================
   BOTTOM NAV (MOBILE ONLY)
============================== */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;

      box-shadow: 0 -4px 14px rgba(0, 0, 0, 0.07);

    .bottom-nav i {

<!-- JS -->
  <script>

      if (localStorage.getItem("theme") === "on") {
    document.body.classList.add("dark");
  }
    /* Firebase */
    const firebaseConfig = {
      apiKey: "AIzaSyAW3atuDYr7OeuT2b-Tn_ooD93ZfPqMA4g",
      authDomain: "taste-lounge-3075.firebaseapp.com",
      projectId: "taste-lounge-3075",
      storageBucket: "taste-lounge-3075.firebasestorage.app",
      messagingSenderId: "923805907944",
      appId: "1:923805907944:web:8c054c78c5cbd75929c25d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

auth.onAuthStateChanged(user => {
  if (!user) {
    location.href = "log-in.html";
  } else {
    loadCartFromFirebase(); // ← THIS IS THE MAGIC
    
  }
});

async function loadCartFromFirebase() {
  const user = auth.currentUser;
  if (!user) return;

  const doc = await db.collection("users").doc(user.uid).get();

  if (doc.exists && Array.isArray(doc.data().cart)) {
    cart = doc.data().cart;
    localStorage.setItem("cart", JSON.stringify(cart));
  }

  renderCart();
  updateCartCount();
}





    /* Mobile menu */
    const menuBtn = document.getElementById("menuBtn");
    const closeMenu = document.getElementById("closeMenu");
    const mobileMenu = document.getElementById("mobileMenu");

    menuBtn.onclick = () => mobileMenu.style.left = "0";
    closeMenu.onclick = () => mobileMenu.style.left = "-100%";


    /* CART LOGIC */
    let cart = JSON.parse(localStorage.getItem("cart")) || [];


function updateCartCount() {
  let totalQty = 0;

  cart.forEach(item => {
    totalQty += item.quantity;
  });

  // Text inside cart page
  const cartCountText = document.getElementById("cart-count");
  if (cartCountText) {
    cartCountText.innerText = `Items in cart: ${totalQty}`;
  }

  // Badges in nav, mobile nav, bottom nav
  document.querySelectorAll(".cart-badge").forEach(badge => {
    if (totalQty > 0) {
      badge.innerText = totalQty;
      badge.style.display = "inline-block";
    } else {
      badge.style.display = "none";
    }
  });
}

    function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  syncCartFirebase();
}

  

    function syncCartFirebase() {
  const user = auth.currentUser;
  if (!user) return;

  db.collection("users")
    .doc(user.uid)
    .set({ cart }, { merge: true });
}



    function renderCart() {
      updateCartCount();

      const itemsDiv = document.getElementById("cart-items");
      const summaryDiv = document.getElementById("cart-summary");

      itemsDiv.innerHTML = "";
      summaryDiv.innerHTML = "";


      if (cart.length === 0) {
  itemsDiv.innerHTML = `
    <div class="empty-cart">
      <p>
        Your cart is empty.<br>
        Browse our categories and discover our best meals!
      </p>

      <button class="browse-btn" onclick="goToFoods()">
        Browse Menu
      </button>
    </div>
  `;

  summaryDiv.style.display = "none";
  return;
}



      let subtotal = 0;

      cart.forEach((item, index) => {
        subtotal += item.price * item.quantity;

        itemsDiv.innerHTML += `
          <div class="cart-item">
            <img src="${item.image}">
            <div>
              <h3>${item.name}</h3>
              <p>₦${item.price}</p>

              <div class="qty">
                <button onclick="changeQty(${index}, -1)">−</button>
                <span>${item.quantity}</span>
                <button onclick="changeQty(${index}, 1)">+</button>
              </div>

              <button class="checkout" onclick="removeItem(${index})">Remove</button>
            </div>
          </div>
        `;
      });

      const delivery = 2000;
      const total = subtotal + delivery;

      localStorage.setItem("cartTotal", total);


      summaryDiv.innerHTML = `
        <p>Subtotal: ₦${subtotal}</p>
        <p>Delivery: ₦${delivery}</p>
        <h2>Total: ₦${total}</h2>
        <button id="hove" onclick="checkout()">Checkout</button>
      `;
    }

    function goToFoods() {
  location.href = "foods.html";
}



    function changeQty(index, change) {
  const newQty = cart[index].quantity + change;

  // ⛔ STOP at 1
  if (newQty < 1) return;

  cart[index].quantity = newQty;

  saveCart();
  renderCart();

    showCartMessage("Cart updated successfully");

}

    function showCartMessage(text) {
      let msg = document.getElementById("cart-msg");
      if (!msg) {
        msg = document.createElement("div");
        msg.id = "cart-msg";
        msg.style.cssText = "position:fixed;top:10px;left:50%;transform:translateX(-50%);background:red;color:white;padding:12px 20px;border-radius:8px;z-index:9999";
        document.body.appendChild(msg);
      }
      msg.innerText = text;
      msg.style.display = "block";
      setTimeout(() => msg.style.display = "none", 4000);
    }


    function removeItem(index) {
      cart.splice(index, 1);
      saveCart();
      renderCart();
          showCartMessage("Cart updated successfully");

    }


    function saveNote(index, text) {
      cart[index].note = text;
      saveCart();
    }

    function checkout() {
      location.href = 'checkout.html'
    }

    renderCart();
    
    window.addEventListener("pageshow", () => {
  if (!localStorage.getItem("cart")) {
    renderCart(); // renders empty state
  }
});


  </script>
